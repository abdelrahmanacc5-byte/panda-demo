
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PANDA E-BIKES & SCOOTERS</title>
<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:white}
.hero{height:100vh;background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.7)),url('https://images.unsplash.com/photo-1517949908118-721e04a7f5a2?q=80&w=1600&auto=format&fit=crop') center/cover;display:flex;align-items:center;justify-content:center;text-align:center}
.hero h1{font-size:70px;margin:0;color:#7CFF5B}
.hero p{font-size:22px}
.btn{padding:14px 25px;background:#7CFF5B;color:black;border:none;border-radius:30px;font-weight:bold}
section{padding:60px 8%}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.card{background:#151515;border-radius:20px;overflow:hidden;transition:.3s}
.card:hover{transform:translateY(-10px)}
.card img{width:100%;height:220px;object-fit:cover}
.card div{padding:15px}
.price{color:#7CFF5B;font-size:24px;font-weight:bold}
.stats{display:flex;justify-content:space-around;flex-wrap:wrap;text-align:center}
.stat h2{color:#7CFF5B;font-size:48px}
.booking{background:#151515;padding:25px;border-radius:20px;max-width:700px;margin:auto}
.booking input,.booking select{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none}
footer{text-align:center;padding:30px;background:#111}
</style>
</head>
<body>

<div class="hero">
<div>
<h1>PANDA</h1>
<p>E-Bikes • Scooters • Professional Service</p>
<button class="btn">Explore Collection</button>
</div>
</div>

<section1>
<h2>Featured Collection</h2>
<div class="cards">
<div class="card">
<img src="https://images.unsplash.com/photo-1541625602330-2277a4c46182?q=80&w=1200&auto=format&fit=crop">
<div><h3>Panda Urban X</h3><p class="price">€2,199</p></div>
</div>
<div class="card">
<img src="https://images.unsplash.com/photo-1511994298241-608e28f14fde?q=80&w=1200&auto=format&fit=crop">
<div><h3>Panda Pro Max</h3><p class="price">€3,559</p></div>
<img src="https://www.chinadailyhk.com/hk/article/596561">
<div><h3>Panda X</h3><p class="price">€20000,9</p></div>
</div>
<div class="card">
<img src="https://images.unsplash.com/photo-1558981806-ec527fa84c39?q=80&w=1200&auto=format&fit=crop">
<div><h3>Panda Scooter Pro</h3><p class="price">€50</p></div>
</div>
</div>
</section>
<section2>
<div><h3>Panda msnX</h3><p class="price">€2,1299</p></div>
<section>
<h2>Book Service</h2>
<div class="booking">
<input placeholder="Full Name">
<input placeholder="Phone Number">
<select>
<option>Brake Service</option>
<option>Battery Check</option>
<option>Full Inspection</option>
</select>
<input type="date">
<button class="btn">Request Appointment</button>
</div>
</section>

<section>
<div class="stats">
<div class="stat"><h2>2500+</h2><p>Customers</p></div>
<div class="stat"><h2>1200+</h2><p>Repairs</p></div>
<div class="stat"><h2>500+</h2><p>E-Bikes Sold</p></div>
</div>
</section>

<footer>
PANDA E-BIKES & SCOOTERS • Sesto San Giovanni
</footer>

</body>
</html>
